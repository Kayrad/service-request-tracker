<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Request Tracker - Responsive</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #66deff;
            --bg-color: #f0f4f9;
            --dark-blue: #1a3c4a;
            --success: #2ecc71;
            --danger: #ff4d4d;
            --warning: #f1c40f;
        }
        * { box-sizing: border-box; font-family: 'Chakra Petch', sans-serif; }
        body { background-color: var(--bg-color); margin: 0; padding: 0; font-size: 16px; }
        h1 { font-size: 1.8rem; text-align: center; }
        #userSelectionPage { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; width: 100%; max-width: 800px; margin-top: 20px; }
        .user-card { background: white; padding: 20px 10px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid #ddd; transition: 0.3s; }
        .user-card:hover { transform: translateY(-5px); border-color: var(--primary-color); }
        #mainDashboard { display: none; padding: 10px; max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .fc { font-size: 0.85rem; }
        .summary-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .stats-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }
        .stat-item { padding: 10px 5px; border-radius: 10px; font-weight: bold; font-size: 0.75rem; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; }
        table { width: 100%; min-width: 500px; border-collapse: collapse; }
        th { background: #f8f9fa; text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .status-badge { padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; color: white; }
        .btn { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; }
        .btn-view { background: var(--primary-color); color: var(--dark-blue); width: 100%; }
        .btn-export { background: #27ae60; color: white; width: 100%; }
        .btn-outline { background: #eee; color: #555; }
        .btn-main { background: var(--primary-color); color: var(--dark-blue); width: 100%; margin-top: 10px; padding: 15px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 95%; max-width: 450px; margin: 10vh auto; padding: 20px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .info-box { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary-color); font-size: 0.9rem; }
        @media (min-width: 768px) {
            #mainDashboard { padding: 30px 20px; }
            .summary-header { flex-direction: row; }
            .stats-group { width: auto; display: flex; }
            .stat-item { font-size: 0.9rem; flex-direction: row; padding: 8px 15px; }
            .btn-export, .btn-view { width: auto; }
        }
    </style>
</head>
<body>

    <div id="userSelectionPage">
        <h1 style="color: var(--dark-blue);">Service Request</h1>
        <div class="user-grid" id="userList"></div>
        <button class="btn btn-outline" style="margin-top: 25px;" onclick="openAddUserModal()">+ เพิ่มรายชื่อพนักงาน</button>
    </div>

    <div id="mainDashboard">
        <div class="header">
            <div>
                <h2 style="margin:0; font-size: 1.1rem;">Dashboard</h2>
                <small id="currentUserName" style="color: var(--primary-color); font-weight: bold;"></small>
            </div>
            <button class="btn btn-outline" style="padding: 8px 12px; font-size: 0.8rem;" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div class="card"><div id="calendar"></div></div>

        <div class="card">
            <div class="summary-header">
                <div class="stats-group">
                    <div class="stat-item" style="background: #eef5ff; color: #1a73e8;"><span>🔵 ทั้งหมด</span> <span id="totalTasks">0</span></div>
                    <div class="stat-item" style="background: #e8f5e9; color: #2e7d32;"><span>🟢 เสร็จแล้ว</span> <span id="doneTasks">0</span></div>
                    <div class="stat-item" style="background: #fff5f5; color: #c62828;"><span>🔴 ยังไม่เสร็จ</span> <span id="pendingTasks">0</span></div>
                </div>
                <button class="btn btn-export" onclick="exportToCSV()">📊 Export Excel</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>รหัส Service Request</th>
                            <th>กำหนดเสร็จ</th>
                            <th>สถานะ</th>
                            <th style="text-align: center;">แอคชั่น</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content"><div id="modalBody"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtvCPhB2bZtxVS7PbBTxPvlZctYu7LUY",
            authDomain: "servicerequest-eb5bc.firebaseapp.com",
            projectId: "servicerequest-eb5bc",
            storageBucket: "servicerequest-eb5bc.firebasestorage.app",
            messagingSenderId: "814861103223",
            appId: "1:814861103223:web:ba2d3ff3d0d9f297b29672",
            databaseURL: "https://servicerequest-eb5bc-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null;
        let myTasks = [];

        onValue(ref(db, 'users'), (snapshot) => {
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            if (snapshot.exists()) {
                Object.entries(snapshot.val()).forEach(([id, data]) => {
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<div style="font-size: 1.5rem;">👤</div><div style="font-size: 0.9rem; margin-top:5px;">${data.name}</div>`;
                    div.onclick = () => login(id, data.name);
                    userList.appendChild(div);
                });
            }
        });

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            locale: 'th', initialView: 'dayGridMonth',
            height: 'auto',
            handleWindowResize: true,
            dateClick: (info) => handleInteraction(info.dateStr),
            eventClick: (info) => handleInteraction(info.event.startStr, info.event.id), 
            events: []
        });

        function handleInteraction(dateStr, eventId = null) {
            if (eventId) {
                window.openManageTaskModal(eventId);
            } else {
                const existingTask = myTasks.find(t => t.deadline === dateStr);
                if (existingTask) {
                    window.openManageTaskModal(existingTask.id);
                } else {
                    window.openAddTaskModal(dateStr);
                }
            }
        }

        window.login = (id, name) => {
            currentUser = { id, name };
            document.getElementById('userSelectionPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('currentUserName').innerText = `พนักงาน: ${name}`;
            loadTasks();
            setTimeout(() => { calendar.render(); calendar.updateSize(); }, 200);
        };

        window.logout = () => { location.reload(); };

        function loadTasks() {
            onValue(ref(db, 'service_requests'), (snapshot) => {
                myTasks = [];
                if (snapshot.exists()) {
                    myTasks = Object.entries(snapshot.val())
                        .map(([id, val]) => ({ id, ...val }))
                        .filter(t => t.ownerId === currentUser.id);
                }
                const events = myTasks.map(t => ({
                    id: t.id, title: `SR: ${t.srCode}`, start: t.deadline,
                    color: t.status === 'done' ? '#2ecc71' : '#ff4d4d'
                }));
                calendar.removeAllEvents();
                calendar.addEventSource(events);
                renderTable();
            });
        }

        function renderTable() {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';
            let doneCount = 0;
            myTasks.sort((a, b) => new Date(b.deadline) - new Date(a.deadline));
            myTasks.forEach(t => {
                const isDone = t.status === 'done';
                if (isDone) doneCount++;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${t.srCode}</b></td>
                    <td>${t.deadline}</td>
                    <td><span class="status-badge" style="background:${isDone ? 'var(--success)' : 'var(--danger)'}">${isDone ? 'เสร็จ' : 'ค้าง'}</span></td>
                    <td style="text-align: center;"><button class="btn btn-view" style="padding: 5px 10px; font-size: 0.75rem;" onclick="viewTaskDetail('${t.id}')">ดูงาน</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('totalTasks').innerText = myTasks.length;
            document.getElementById('doneTasks').innerText = doneCount;
            document.getElementById('pendingTasks').innerText = myTasks.length - doneCount;
        }

        window.viewTaskDetail = (id) => {
            const t = myTasks.find(item => item.id === id);
            document.getElementById('modalBody').innerHTML = `
                <h3 style="margin: 0 0 15px 0;">รายละเอียดงาน</h3>
                <div class="info-box"><strong>รหัส Service Request:</strong><br>${t.srCode}</div>
                <div class="info-box"><strong>รายละเอียด:</strong><br>${t.detail || '-'}</div>
                <div class="info-box"><strong>กำหนดเสร็จ:</strong> ${t.deadline}</div>
                <button class="btn btn-outline" style="width:100%; padding: 12px;" onclick="closeModal()">ปิด</button>
            `;
            document.getElementById('appModal').style.display = 'block';
        };

        window.openAddTaskModal = (date) => {
            document.getElementById('modalBody').innerHTML = `
                <h3 style="margin: 0 0 15px 0;">บันทึกงาน (${date})</h3>
                <input type="text" id="srCode" placeholder="รหัส Service Request">
                <textarea id="taskDetail" placeholder="ระบุรายละเอียดงาน..." rows="3"></textarea>
                <button class="btn btn-main" onclick="saveTask('${date}')">บันทึกข้อมูล</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; padding:12px;" onclick="closeModal()">ยกเลิก</button>
            `;
            document.getElementById('appModal').style.display = 'block';
        };

        window.openManageTaskModal = (id) => {
            const task = myTasks.find(t => t.id === id);
            document.getElementById('modalBody').innerHTML = `
                <h3 style="margin: 0 0 15px 0;">จัดการงาน</h3>
                <p><strong>รหัส Service Request:</strong> ${task.srCode}</p>
                <button class="btn btn-main" style="background:var(--success); color:white; margin-top:0;" onclick="updateStatus('${id}', 'done')">✔️ เปลี่ยนเป็นเสร็จสิ้น</button>
                <button class="btn btn-outline" style="width:100%; color:red; margin-top:10px; padding:12px;" onclick="deleteTask('${id}')">🗑️ ลบงานนี้</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; padding:12px;" onclick="closeModal()">ปิดหน้าต่าง</button>
            `;
            document.getElementById('appModal').style.display = 'block';
        };

        window.saveTask = (date) => {
            const code = document.getElementById('srCode').value.trim();
            const detail = document.getElementById('taskDetail').value.trim();
            if(code) {
                push(ref(db, 'service_requests'), { ownerId: currentUser.id, srCode: code, detail: detail, deadline: date, status: 'pending' });
                closeModal();
            }
        };
        window.updateStatus = (id, status) => { update(ref(db, `service_requests/${id}`), { status: status }); closeModal(); };
        window.deleteTask = (id) => { if(confirm("ต้องการลบงานนี้?")) { remove(ref(db, `service_requests/${id}`)); closeModal(); } };
        window.openAddUserModal = () => {
            document.getElementById('modalBody').innerHTML = `<h3>เพิ่มพนักงาน</h3><input type="text" id="newName" placeholder="ชื่อ-นามสกุล"><button class="btn btn-main" onclick="saveUser()">บันทึก</button><button class="btn btn-outline" style="width:100%; margin-top:10px; padding:12px;" onclick="closeModal()">ยกเลิก</button>`;
            document.getElementById('appModal').style.display = 'block';
        };
        window.saveUser = () => { const n = document.getElementById('newName').value.trim(); if(n) { push(ref(db, 'users'), { name: n }); closeModal(); } };
        window.closeModal = () => document.getElementById('appModal').style.display = 'none';
        window.exportToCSV = () => {
            let csv = "\uFEFFรหัส Service Request,กำหนดเสร็จ,สถานะ,รายละเอียด\n";
            myTasks.forEach(t => csv += `"${t.srCode}","${t.deadline}","${t.status === 'done' ? 'เสร็จ' : 'ค้าง'}","${t.detail}"\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
            link.download = `Report_${currentUser.name}.csv`; link.click();
        };
    </script>
</body>
</html>
