<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Service Request Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #003366;
            --bg-color: #f4f7fa;
            --success-color: #2ecc71;
            --pending-color: #00aaff;
        }
        
        * { box-sizing: border-box; font-family: 'Chakra Petch', sans-serif; }
        
        /* บังคับให้แสดงผลขนาดมือถือทั้งในคอมและมือถือ */
        body { 
            background-color: #333; /* พื้นหลังด้านนอก */
            margin: 0; 
            display: flex; 
            justify-content: center;
        }

        .app-shell {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 450px; /* บังคับขนาดหน้าจอ */
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow-x: hidden;
        }

        #userSelectionPage { padding: 20px; text-align: center; }
        .user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .user-card { background: white; padding: 15px; border-radius: 12px; cursor: pointer; border-bottom: 4px solid #ddd; }

        #mainDashboard { display: none; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .card { background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; width: 100%; overflow: hidden; }

        /* ปรับแต่งปฏิทินไม่ให้ล้นขอบ */
        #calendar { 
            max-width: 100% !important;
            font-size: 0.7rem; 
        }
        .fc { table-layout: fixed !important; }
        .fc-toolbar-title { font-size: 0.9rem !important; }
        .fc-button { padding: 2px 5px !important; font-size: 0.7rem !important; }
        .fc-daygrid-day-number { padding: 2px !important; }
        .fc-event { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: none !important; }

        /* Stats Bar */
        .stats-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-item { padding: 8px 2px; border-radius: 8px; font-weight: bold; font-size: 0.65rem; text-align: center; background: white; border: 1px solid #eee; }

        /* Table Responsive */
        .table-container { overflow-x: auto; width: 100%; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; min-width: 400px; border-collapse: collapse; }
        th, td { padding: 10px 5px; font-size: 0.75rem; text-align: left; border-bottom: 1px solid #f0f0f0; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; width: 90%; max-width: 380px; margin: 20% auto; padding: 20px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-main { background: var(--primary-color); color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="userSelectionPage">
            <h1 style="color: var(--primary-color);">Service Request</h1>
            <div class="user-grid" id="userList"></div>
            <button onclick="openAddUserModal()" style="margin-top: 20px; border: none; background: none; color: #666;">+ เพิ่มพนักงาน</button>
        </div>

        <div id="mainDashboard">
            <div class="header">
                <div><b id="currentUserName" style="color: var(--primary-color);"></b></div>
                <button onclick="location.reload()" style="border: none; background: #eee; padding: 5px 10px; border-radius: 8px;">ออก</button>
            </div>

            <div class="card"><div id="calendar"></div></div>

            <div class="card">
                <div class="stats-group">
                    <div class="stat-item" style="border-top: 3px solid #1a73e8;">ทั้งหมด <div id="totalTasks">0</div></div>
                    <div class="stat-item" style="border-top: 3px solid var(--success-color);">เสร็จ <div id="doneTasks">0</div></div>
                    <div class="stat-item" style="border-top: 3px solid var(--pending-color);">ค้าง <div id="pendingTasks">0</div></div>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>SR</th><th>วันที่</th><th>สถานะ</th><th></th></tr></thead>
                        <tbody id="taskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="appModal" class="modal"><div class="modal-content" id="modalBody"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMtvCPhB2bZtxVS7PbBTxPvlZctYu7LUY",
            authDomain: "servicerequest-eb5bc.firebaseapp.com",
            projectId: "servicerequest-eb5bc",
            storageBucket: "servicerequest-eb5bc.firebasestorage.app",
            messagingSenderId: "814861103223",
            appId: "1:814861103223:web:ba2d3ff3d0d9f297b29672",
            databaseURL: "https://servicerequest-eb5bc-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentUser = null, myTasks = [];

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
            locale: 'th',
            initialView: 'dayGridMonth',
            height: 'auto',
            dayMaxEventRows: true, // บังคับให้งานไม่ล้นช่อง
            headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
            dateClick: (info) => handleInteraction(info.dateStr),
            eventClick: (info) => handleInteraction(info.event.startStr, info.event.id),
            events: []
        });

        function handleInteraction(dateStr, eventId = null) {
            if (eventId) { openManageTaskModal(eventId); } 
            else {
                const existing = myTasks.find(t => t.deadline === dateStr);
                existing ? openManageTaskModal(existing.id) : openAddTaskModal(dateStr);
            }
        }

        onValue(ref(db, 'users'), (snapshot) => {
            const userList = document.getElementById('userList'); userList.innerHTML = '';
            if (snapshot.exists()) {
                Object.entries(snapshot.val()).forEach(([id, data]) => {
                    const div = document.createElement('div');
                    div.className = 'user-card'; div.innerHTML = `👤<br>${data.name}`;
                    div.onclick = () => login(id, data.name); userList.appendChild(div);
                });
            }
        });

        window.login = (id, name) => {
            currentUser = { id, name };
            document.getElementById('userSelectionPage').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('currentUserName').innerText = name;
            loadTasks();
            setTimeout(() => { calendar.render(); calendar.updateSize(); }, 300);
        };

        function loadTasks() {
            onValue(ref(db, 'service_requests'), (snapshot) => {
                myTasks = [];
                if (snapshot.exists()) {
                    myTasks = Object.entries(snapshot.val()).map(([id, v]) => ({ id, ...v })).filter(t => t.ownerId === currentUser.id);
                }
                calendar.removeAllEvents();
                calendar.addEventSource(myTasks.map(t => ({
                    id: t.id, title: t.srCode, start: t.deadline,
                    color: t.status === 'done' ? '#2ecc71' : '#00aaff'
                })));
                renderTable();
            });
        }

        function renderTable() {
            const tbody = document.getElementById('taskTableBody'); tbody.innerHTML = '';
            let done = 0;
            myTasks.sort((a,b) => new Date(b.deadline) - new Date(a.deadline)).forEach(t => {
                if (t.status === 'done') done++;
                tbody.innerHTML += `<tr><td><b>${t.srCode}</b></td><td>${t.deadline}</td><td>${t.status==='done'?'✅':'⏳'}</td><td><button onclick="openManageTaskModal('${t.id}')">ดู</button></td></tr>`;
            });
            document.getElementById('totalTasks').innerText = myTasks.length;
            document.getElementById('doneTasks').innerText = done;
            document.getElementById('pendingTasks').innerText = myTasks.length - done;
        }

        window.openAddTaskModal = (date) => {
            document.getElementById('modalBody').innerHTML = `
                <h3>บันทึกงานใหม่</h3><p>${date}</p>
                <input type="text" id="srCode" placeholder="รหัส Service Request">
                <textarea id="taskDetail" placeholder="รายละเอียดงาน"></textarea>
                <button class="btn-main" onclick="saveTask('${date}')">บันทึก</button>
                <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none;">ยกเลิก</button>`;
            document.getElementById('appModal').style.display = 'block';
        };

        window.saveTask = (date) => {
            const code = document.getElementById('srCode').value.trim();
            if(code) { push(ref(db, 'service_requests'), { ownerId: currentUser.id, srCode: code, detail: document.getElementById('taskDetail').value, deadline: date, status: 'pending' }); closeModal(); }
        };

        window.openManageTaskModal = (id) => {
            const task = myTasks.find(t => t.id === id);
            document.getElementById('modalBody').innerHTML = `
                <h3>จัดการงาน</h3><p>${task.srCode}</p>
                <button class="btn-main" style="background:#2ecc71;" onclick="updateStatus('${id}', 'done')">เสร็จสิ้นงานนี้</button>
                <button onclick="deleteTask('${id}')" style="width:100%; color:red; margin-top:15px; border:none; background:none;">ลบงาน</button>
                <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none;">ปิด</button>`;
            document.getElementById('appModal').style.display = 'block';
        };

        window.openAddUserModal = () => {
            document.getElementById('modalBody').innerHTML = `<h3>เพิ่มพนักงาน</h3><input type="text" id="newName" placeholder="ชื่อ-นามสกุล"><button class="btn-main" onclick="saveUser()">บันทึก</button>`;
            document.getElementById('appModal').style.display = 'block';
        };

        window.saveUser = () => { const n = document.getElementById('newName').value.trim(); if(n) { push(ref(db, 'users'), { name: n }); closeModal(); } };
        window.updateStatus = (id, s) => { update(ref(db, `service_requests/${id}`), { status: s }); closeModal(); };
        window.deleteTask = (id) => { if(confirm("ลบงานนี้?")) { remove(ref(db, `service_requests/${id}`)); closeModal(); } };
        window.closeModal = () => document.getElementById('appModal').style.display = 'none';
    </script>
</body>
</html>
